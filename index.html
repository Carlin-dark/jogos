<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jogo 2D - Socket.IO</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #243b53, #0b1220 70%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      color: #f5f7fb;
      overflow: auto;
      padding: 14px;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      min-height: 100%;
      padding: 10px;
      overflow: visible;
    }

    .game-area {
      position: relative;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.1);
      background: #090d14;
    }

    .joystick-wrap {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 3;
      display: none;
      pointer-events: auto;
    }

    .joystick-base {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: rgba(7, 14, 24, 0.65);
      border: 2px solid rgba(255,255,255,0.22);
      position: relative;
      touch-action: none;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.08), 0 10px 26px rgba(0,0,0,0.35);
    }

    .joystick-knob {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3dff69, #11c636);
      position: absolute;
      left: 29px;
      top: 29px;
      transform: translate(0, 0);
      box-shadow: 0 0 16px rgba(17, 198, 54, 0.45);
    }

    canvas {
      border: 2px solid rgba(83, 255, 124, 0.9);
      background: #0a0a0a;
      display: block;
      cursor: crosshair;
      width: 100%;
      height: auto;
      max-width: 1200px;
      max-height: 800px;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Mobile Responsivo */
    @media (max-width: 1024px) {
      .container {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 5px;
      }

      canvas {
        max-width: 100vw;
        max-height: 50vh;
      }
    }

    @media (max-width: 768px) {
      body {
        font-size: 12px;
      }

      .container {
        flex-direction: column;
        gap: 5px;
        padding: 5px;
      }

      canvas {
        max-width: 100vw;
        max-height: 55vh;
      }

      .status, .server-config {
        max-width: 100vw;
        width: 100%;
        min-width: auto;
      }
    }

    @media (max-width: 480px) {
      body {
        font-size: 10px;
      }

      .status {
        padding: 10px;
      }

      .status h2 {
        font-size: 12px;
      }

      .status-item {
        font-size: 10px;
        padding: 3px 0;
      }

      .player-entry {
        padding: 5px;
        font-size: 9px;
      }

      .controls {
        padding: 8px;
        font-size: 10px;
      }

      .controls p {
        margin: 3px 0;
      }

      .server-config {
        padding: 10px;
      }

      .server-config h2 {
        font-size: 12px;
      }

      .server-config input {
        padding: 6px;
        font-size: 10px;
      }

      .server-config button {
        padding: 6px;
        font-size: 10px;
      }
    }

    .status {
      background: linear-gradient(180deg, rgba(34, 34, 34, 0.95), rgba(17, 17, 17, 0.95));
      padding: 15px;
      border-radius: 14px;
      min-width: 250px;
      width: min(100%, 320px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 32px rgba(0,0,0,0.28);
    }

    .status h2 {
      margin-bottom: 10px;
      color: #0f0;
      font-size: 14px;
      text-transform: uppercase;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid #333;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: #aaa;
    }

    .status-value {
      color: #0f0;
      font-weight: bold;
    }

    .connection-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .connected {
      background: #0f0;
      box-shadow: 0 0 10px #0f0;
    }

    .disconnected {
      background: #f00;
      box-shadow: 0 0 10px #f00;
    }

    .players-list {
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .player-entry {
      background: #111;
      padding: 8px;
      margin: 5px 0;
      border-left: 3px solid #0f0;
      font-size: 11px;
    }

    .controls {
      margin-top: 15px;
      font-size: 11px;
      background: rgba(9, 13, 20, 0.92);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls p {
      margin: 5px 0;
      color: #c2cad8;
    }

    .score {
      color: #ff0;
    }

    .server-config {
      background: linear-gradient(180deg, rgba(34, 34, 34, 0.95), rgba(17, 17, 17, 0.95));
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      min-width: 250px;
      width: min(100%, 320px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.28);
    }

    .server-config input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      background: rgba(9, 13, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      color: #8dff9f;
      border-radius: 8px;
      font-family: monospace;
    }

    .server-config button {
      width: 100%;
      padding: 9px;
      margin: 5px 0;
      background: linear-gradient(135deg, #3dff69, #11c636);
      color: #04110a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .server-config button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(17, 198, 54, 0.25);
    }

    .server-config button:active {
      transform: scale(0.98);
    }

    .message-log, .chat-box {
      background: #111;
      padding: 8px;
      margin: 10px 0;
      border-radius: 3px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 10px;
      color: #666;
    }

    .chat-input-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .chat-input-row input {
      flex: 1;
      min-width: 0;
    }

    .chat-input-row button {
      width: auto;
      min-width: 74px;
      margin: 0;
    }

    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid #222;
    }

    .log-entry.success {
      color: #0f0;
    }

    .log-entry.error {
      color: #f00;
    }

    .log-entry.info {
      color: #0af;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Área do Jogo -->
    <div class="game-area">
      <canvas id="gameCanvas" width="1200" height="800"></canvas>
      <div class="joystick-wrap" id="joystickWrap" style="display:none;">
        <div class="joystick-base" id="joystickBase">
          <div class="joystick-knob" id="joystickKnob"></div>
        </div>
      </div>
    </div>

    <!-- Painel de Status -->
    <div class="status">
      <h2>Status do Jogo</h2>

      <div class="status-item">
        <span class="status-label">Conexão:</span>
        <span class="status-value">
          <span class="connection-indicator disconnected" id="connIndicator"></span>
          <span id="connStatus">Desconectado</span>
        </span>
      </div>

      <div class="status-item">
        <span class="status-label">ID do Socket:</span>
        <span class="status-value" id="socketId">-</span>
      </div>

      <div class="status-item">
        <span class="status-label">Sua Pontuação:</span>
        <span class="status-value score" id="playerScore">0</span>
      </div>

      <div class="status-item">
        <span class="status-label">Inimigos:</span>
        <span class="status-value" id="enemyCount">0</span>
      </div>

      <div class="status-item">
        <span class="status-label">FPS:</span>
        <span class="status-value" id="fpsCounter">60</span>
      </div>

      <div class="players-list">
        <h3 style="font-size: 12px; margin: 10px 0 5px 0; color: #0af;">Jogadores:</h3>
        <div id="playersList"></div>
      </div>

      <div class="controls">
        <p><strong>Controles:</strong></p>
        <p>➡️ Setas ou WASD - Mover</p>
        <p>🖱️ Mouse/Toque - Mirar e Atirar</p>
        <p>ESPAÇO - Dash</p>
      </div>
    </div>

    <!-- Configuração do Servidor -->
    <div class="server-config">
      <h2 style="margin-bottom: 10px; color: #0f0; font-size: 14px; text-transform: uppercase;">Configuração</h2>

      <label style="font-size: 11px; color: #aaa;">URL do Servidor:</label>
      <input type="text" id="serverUrl" value="" />

      <label style="font-size: 11px; color: #aaa; display: block; margin-top: 8px;">Seu nome:</label>
      <input type="text" id="playerName" value="Jogador" />

      <label style="font-size: 11px; color: #aaa; display: block; margin-top: 8px;">
        <input type="checkbox" id="mobileToggle" /> Mobile
      </label>

      <label style="font-size: 11px; color: #aaa; display: block; margin-top: 8px;">Sala:</label>
      <input type="text" id="roomName" value="sala1" />

      <button id="connectBtn">Conectar</button>
      <button id="disconnectBtn" style="background: #f00;">Desconectar</button>

      <div class="message-log">
        <div id="messageLog"></div>
      </div>

      <label style="font-size: 11px; color: #aaa; display: block; margin-top: 10px;">Chat:</label>
      <div class="chat-box" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Escreva uma mensagem" />
        <button id="sendChatBtn" style="background: #0af; color: #000; font-size: 11px;">Enviar</button>
      </div>

      <label style="font-size: 11px; color: #aaa; display: block; margin-top: 10px;">Teste Rápido:</label>
      <button id="testEmitBtn" style="background: #0af; color: #000; font-size: 11px;">Enviar Teste</button>
    </div>
  </div>

  <script>
    const config = {
      canvas: null,
      ctx: null,
      socket: null,
      width: 1200,
      height: 800,
      player: {
        x: 300,
        y: 200,
        vx: 0,
        vy: 0,
        radius: 10,
        angle: 0,
        speed: 4.8,
        dashCooldown: 0,
        dashDuration: 0,
        score: 0,
        health: 100,
        maxHealth: 100,
        alive: true,
        kills: 0,
        deaths: 0,
        respawnTimer: 0,
        lastInputAt: 0
      },
      players: [],
      enemies: [],
      bullets: [],
      obstacles: [],
      remotePlayers: [],
      winner: null,
      keys: {},
      mouse: { x: 300, y: 200, down: false },
      lastFrameTime: 0,
      fps: 0,
      connected: false,
      lastUpdateTime: 0,
      updateInterval: 50,
      roomName: 'sala1',
      playerName: 'Jogador',
      mobileControlsEnabled: false,
      joystick: { active: false, x: 0, y: 0 },
      effects: { deathFlash: 0, respawnPulse: 0 }
    };

    function initGame() {
      config.canvas = document.getElementById('gameCanvas');
      config.ctx = config.canvas.getContext('2d');
      resizeCanvas();

      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('keyup', handleKeyUp);

      config.canvas.addEventListener('mousemove', handleMouseMove);
      config.canvas.addEventListener('mousedown', handleMouseDown);
      config.canvas.addEventListener('mouseup', handleMouseUp);
      config.canvas.addEventListener('pointermove', handleMouseMove);
      config.canvas.addEventListener('pointerdown', handleMouseDown);
      config.canvas.addEventListener('pointerup', handleMouseUp);
      config.canvas.addEventListener('pointerleave', handleMouseUp);
      config.canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
      config.canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      config.canvas.addEventListener('touchend', handleTouchEnd, { passive: false });

      window.addEventListener('orientationchange', resizeCanvas);
      window.addEventListener('resize', resizeCanvas);

      document.getElementById('connectBtn').addEventListener('click', connectSocket);
      document.getElementById('disconnectBtn').addEventListener('click', disconnectSocket);
      document.getElementById('testEmitBtn').addEventListener('click', testEmit);
      document.getElementById('sendChatBtn').addEventListener('click', sendChatMessage);
      document.getElementById('mobileToggle').addEventListener('change', toggleJoystickVisibility);
      document.getElementById('chatInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          sendChatMessage();
        }
      });

      const existingUrl = new URLSearchParams(window.location.search).get('server');
      const roomParam = new URLSearchParams(window.location.search).get('room');
      const nameParam = new URLSearchParams(window.location.search).get('name');
      const defaultServerUrl = window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin;
      document.getElementById('serverUrl').value = existingUrl || defaultServerUrl;
      document.getElementById('playerName').value = nameParam || 'Jogador';
      document.getElementById('roomName').value = roomParam || 'sala1';
      config.roomName = roomParam || 'sala1';
      config.playerName = nameParam || 'Jogador';

      setupJoystick();
      toggleJoystickVisibility();
      gameLoop();
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      config.canvas.width = config.width * dpr;
      config.canvas.height = config.height * dpr;
      config.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function setupJoystick() {
      const base = document.getElementById('joystickBase');
      const knob = document.getElementById('joystickKnob');
      if (!base || !knob) return;

      const updateJoystick = (clientX, clientY) => {
        const rect = base.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = clientX - centerX;
        const dy = clientY - centerY;
        const maxDistance = rect.width / 2 - 22;
        const distance = Math.min(maxDistance, Math.sqrt(dx * dx + dy * dy));
        const angle = Math.atan2(dy, dx);
        const offsetX = Math.cos(angle) * distance;
        const offsetY = Math.sin(angle) * distance;
        const magnitude = distance / maxDistance;

        knob.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        config.joystick.active = magnitude > 0.05;
        config.joystick.x = config.joystick.active ? dx / (maxDistance || 1) : 0;
        config.joystick.y = config.joystick.active ? dy / (maxDistance || 1) : 0;
      };

      const resetJoystick = () => {
        config.joystick.active = false;
        config.joystick.x = 0;
        config.joystick.y = 0;
        knob.style.transform = 'translate(0, 0)';
      };

      base.addEventListener('pointerdown', (event) => {
        if (!config.mobileControlsEnabled) return;
        event.preventDefault();
        base.setPointerCapture(event.pointerId);
        config.joystick.active = true;
        updateJoystick(event.clientX, event.clientY);
      });

      base.addEventListener('pointermove', (event) => {
        if (!config.mobileControlsEnabled || !config.joystick.active) return;
        event.preventDefault();
        updateJoystick(event.clientX, event.clientY);
      });

      base.addEventListener('pointerup', resetJoystick);
      base.addEventListener('pointercancel', resetJoystick);
      base.addEventListener('pointerleave', resetJoystick);
      window.addEventListener('pointerup', resetJoystick);
    }

    function toggleJoystickVisibility() {
      const enabled = document.getElementById('mobileToggle').checked;
      const wrap = document.getElementById('joystickWrap');
      config.mobileControlsEnabled = enabled;
      if (wrap) {
        wrap.style.display = enabled ? 'block' : 'none';
      }
      if (!enabled) {
        config.joystick.active = false;
        config.joystick.x = 0;
        config.joystick.y = 0;
        const knob = document.getElementById('joystickKnob');
        if (knob) knob.style.transform = 'translate(0, 0)';
      }
    }

    function connectSocket() {
      const url = (document.getElementById('serverUrl').value || '').trim() || (window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin);
      config.roomName = (document.getElementById('roomName').value || 'sala1').trim() || 'sala1';
      config.playerName = (document.getElementById('playerName').value || '').trim() || `Jogador-${Math.floor(Math.random() * 1000)}`;

      if (config.socket) config.socket.disconnect();

      config.socket = io(url, {
        transports: ['websocket'],
        forceNew: true,
        reconnection: true,
        query: { room: config.roomName, name: config.playerName },
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        reconnectionAttempts: 5
      });

      config.socket.on('connect', () => {
        config.connected = true;
        updateUI();
        addLog(`Conectado na sala ${config.roomName}!`, 'success');
        config.socket.emit('joinRoom', { roomName: config.roomName });
      });

      config.socket.on('playerAssigned', (data) => {
        config.playerId = data.id;
        if (data.name) config.playerName = data.name;
        if (data.room) {
          config.roomName = data.room;
          document.getElementById('roomName').value = data.room;
        }
      });

      config.socket.on('disconnect', () => {
        config.connected = false;
        config.enemies = [];
        config.bullets = [];
        updateUI();
        addLog('Desconectado do servidor', 'error');
      });

      config.socket.on('connect_error', (err) => {
        addLog(`Erro: ${err.message}`, 'error');
      });

      config.socket.on('gameState', (data) => {
        config.players = data.players || [];
        config.enemies = data.enemies || [];
        config.bullets = data.bullets || [];
        config.obstacles = data.obstacles || [];
        config.winner = data.winner || null;
        config.remotePlayers = config.players.filter((player) => player.id !== config.socket.id);

        const self = config.players.find((player) => player.id === config.socket.id);
        if (self) {
          config.player.angle = self.angle || config.player.angle;
          config.player.score = self.score || 0;
          config.player.health = self.health || config.player.health;
          config.player.maxHealth = self.maxHealth || 100;
          config.player.alive = self.alive !== false;
          config.player.kills = self.kills || 0;
          config.player.deaths = self.deaths || 0;
          config.player.respawnTimer = self.respawnTimer || 0;

          const now = performance.now();
          const hasRecentLocalInput = now - config.player.lastInputAt < 120;
          if (!hasRecentLocalInput) {
            config.player.x = config.player.x * 0.75 + self.x * 0.25;
            config.player.y = config.player.y * 0.75 + self.y * 0.25;
          }
        }

        updatePlayersList(config.players);
        updateUI();
      });

      config.socket.on('message', (data) => {
        addLog(`Servidor: ${data.msg}`, 'info');
      });

      config.socket.on('chatMessage', (message) => {
        addChatMessage(message);
      });
    }

    function disconnectSocket() {
      if (config.socket) {
        config.socket.disconnect();
        config.connected = false;
        updateUI();
        addLog('Desconectado manualmente', 'info');
      }
    }

    function testEmit() {
      if (!config.socket || !config.connected) {
        addLog('Não conectado ao servidor', 'error');
        return;
      }
      config.socket.emit('hello', {
        msg: 'Olá do jogo!',
        playerPos: { x: config.player.x, y: config.player.y },
        score: config.player.score
      });
      addLog('Mensagem de teste enviada', 'success');
    }

    function sendChatMessage() {
      if (!config.socket || !config.connected) return;
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      config.socket.emit('chatMessage', { text });
      input.value = '';
    }

    function handleKeyDown(e) {
      config.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') {
        e.preventDefault();
        dash();
      }
    }

    function handleKeyUp(e) {
      config.keys[e.key.toLowerCase()] = false;
    }

    function getPointerPosition(e) {
      const rect = config.canvas.getBoundingClientRect();
      const scaleX = config.width / rect.width;
      const scaleY = config.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function handleMouseMove(e) {
      const pos = getPointerPosition(e);
      config.mouse.x = pos.x;
      config.mouse.y = pos.y;
    }

    function handleMouseDown(e) {
      const pos = getPointerPosition(e);
      config.mouse.x = pos.x;
      config.mouse.y = pos.y;
      config.mouse.down = true;
    }

    function handleMouseUp() {
      config.mouse.down = false;
    }

    function handleTouchMove(e) {
      e.preventDefault();
      const touch = e.touches[0];
      if (touch) {
        const pos = getPointerPosition(touch);
        config.mouse.x = pos.x;
        config.mouse.y = pos.y;
      }
    }

    function handleTouchStart(e) {
      e.preventDefault();
      const touch = e.touches[0];
      if (touch) {
        const pos = getPointerPosition(touch);
        config.mouse.x = pos.x;
        config.mouse.y = pos.y;
      }
      config.mouse.down = true;
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      config.mouse.down = false;
    }

    function updatePlayer() {
      config.player.vx = 0;
      config.player.vy = 0;

      if (!config.player.alive) {
        if (config.player.respawnTimer > 0) config.player.respawnTimer = Math.max(0, config.player.respawnTimer - 1);
        return;
      }

      let moved = false;
      if (config.keys['arrowup'] || config.keys['w']) { config.player.vy -= config.player.speed; moved = true; }
      if (config.keys['arrowdown'] || config.keys['s']) { config.player.vy += config.player.speed; moved = true; }
      if (config.keys['arrowleft'] || config.keys['a']) { config.player.vx -= config.player.speed; moved = true; }
      if (config.keys['arrowright'] || config.keys['d']) { config.player.vx += config.player.speed; moved = true; }

      if (config.mobileControlsEnabled && config.joystick.active) {
        config.player.vx += config.joystick.x / 100 * config.player.speed;
        config.player.vy += config.joystick.y / 100 * config.player.speed;
        moved = true;
      }

      if (moved) {
        config.player.lastInputAt = performance.now();
      }

      const friction = 0.88;
      config.player.vx *= friction;
      config.player.vy *= friction;

      config.player.x += config.player.vx;
      config.player.y += config.player.vy;
      config.player.x = Math.max(config.player.radius, Math.min(config.width - config.player.radius, config.player.x));
      config.player.y = Math.max(config.player.radius, Math.min(config.height - config.player.radius, config.player.y));
      config.player.angle = Math.atan2(config.mouse.y - config.player.y, config.mouse.x - config.player.x);

      if (config.player.dashCooldown > 0) config.player.dashCooldown--;
      if (config.player.dashDuration > 0) config.player.dashDuration--;

      if (config.mouse.down && config.connected) shoot();
    }

    function dash() {
      if (config.player.dashCooldown <= 0) {
        config.player.dashDuration = 10;
        config.player.dashCooldown = 30;
      }
    }

    function shoot() {
      if (!config.player.alive || !config.connected || !config.socket) return;
      if (config.socket && config.connected) {
        config.socket.emit('shoot', {
          x: config.player.x,
          y: config.player.y,
          angle: config.player.angle
        });
      }
    }

    function render() {
      config.ctx.fillStyle = '#0a0a0a';
      config.ctx.fillRect(0, 0, config.width, config.height);

      config.ctx.strokeStyle = '#1a1a1a';
      config.ctx.lineWidth = 0.5;
      for (let i = 0; i <= config.width; i += 50) {
        config.ctx.beginPath();
        config.ctx.moveTo(i, 0);
        config.ctx.lineTo(i, config.height);
        config.ctx.stroke();
      }
      for (let i = 0; i <= config.height; i += 50) {
        config.ctx.beginPath();
        config.ctx.moveTo(0, i);
        config.ctx.lineTo(config.width, i);
        config.ctx.stroke();
      }

      drawObstacles();
      drawBullets();
      drawEnemies();
      drawRemotePlayers();
      drawPlayer();
      drawHUD();
    }

    function drawPlayer() {
      const player = config.player;
      if (!player.alive) {
        const pulse = 1 + Math.sin((performance.now() / 180)) * 0.08;
        config.ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(performance.now() / 120) * 0.2})`;
        config.ctx.beginPath();
        config.ctx.arc(player.x, player.y, player.radius * pulse, 0, Math.PI * 2);
        config.ctx.fill();
        return;
      }

      const bobbing = 1 + Math.sin(performance.now() / 180) * 0.03;
      config.ctx.fillStyle = '#0f0';
      config.ctx.beginPath();
      config.ctx.arc(player.x, player.y, player.radius * bobbing, 0, Math.PI * 2);
      config.ctx.fill();

      const pointerLength = player.radius * 2;
      const pointerX = player.x + Math.cos(player.angle) * pointerLength;
      const pointerY = player.y + Math.sin(player.angle) * pointerLength;

      config.ctx.strokeStyle = '#0f0';
      config.ctx.lineWidth = 2;
      config.ctx.beginPath();
      config.ctx.moveTo(player.x, player.y);
      config.ctx.lineTo(pointerX, pointerY);
      config.ctx.stroke();

      if (player.dashDuration > 0) {
        config.ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
        config.ctx.beginPath();
        config.ctx.arc(player.x, player.y, player.radius * 2, 0, Math.PI * 2);
        config.ctx.fill();
      }

      drawHealthBar(player.x, player.y - player.radius - 15, player.health, player.maxHealth);
    }

    function drawRemotePlayers() {
      for (const player of config.remotePlayers) {
        const x = player.x || 0;
        const y = player.y || 0;
        const angle = player.angle || 0;
        const alive = player.alive !== false;

        config.ctx.fillStyle = alive ? '#0af' : '#777';
        config.ctx.beginPath();
        config.ctx.arc(x, y, player.radius || 10, 0, Math.PI * 2);
        config.ctx.fill();

        const pointerLength = (player.radius || 10) * 2;
        const pointerX = x + Math.cos(angle) * pointerLength;
        const pointerY = y + Math.sin(angle) * pointerLength;

        config.ctx.strokeStyle = alive ? '#0af' : '#777';
        config.ctx.lineWidth = 2;
        config.ctx.beginPath();
        config.ctx.moveTo(x, y);
        config.ctx.lineTo(pointerX, pointerY);
        config.ctx.stroke();

        config.ctx.fillStyle = '#fff';
        config.ctx.font = '10px monospace';
        config.ctx.textAlign = 'center';
        config.ctx.fillText(player.name || 'Jogador', x, y - 16);
      }
    }

    function drawBullets() {
      config.ctx.fillStyle = '#ff0';
      for (const bullet of config.bullets) {
        config.ctx.beginPath();
        config.ctx.arc(bullet.x, bullet.y, bullet.radius || 4, 0, Math.PI * 2);
        config.ctx.fill();
      }
    }

    function drawEnemies() {
      for (const enemy of config.enemies) {
        config.ctx.fillStyle = '#f00';
        config.ctx.beginPath();
        config.ctx.arc(enemy.x || 0, enemy.y || 0, enemy.radius || 10, 0, Math.PI * 2);
        config.ctx.fill();
        if (enemy.health !== undefined) drawHealthBar(enemy.x - 15, enemy.y - 25, enemy.health, enemy.maxHealth);
      }
    }

    function drawObstacles() {
      config.ctx.fillStyle = '#444';
      for (const obstacle of config.obstacles) {
        config.ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
        config.ctx.strokeStyle = '#666';
        config.ctx.strokeRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
      }
    }

    function drawHealthBar(x, y, health, maxHealth) {
      const barWidth = 30;
      const barHeight = 4;
      config.ctx.fillStyle = '#333';
      config.ctx.fillRect(x, y, barWidth, barHeight);
      const percentage = Math.max(0, health / maxHealth);
      const healthColor = percentage > 0.5 ? '#0f0' : percentage > 0.25 ? '#ff0' : '#f00';
      config.ctx.fillStyle = healthColor;
      config.ctx.fillRect(x, y, barWidth * percentage, barHeight);
      config.ctx.strokeStyle = healthColor;
      config.ctx.lineWidth = 1;
      config.ctx.strokeRect(x, y, barWidth, barHeight);
    }

    function drawHUD() {
      config.ctx.fillStyle = '#0f0';
      config.ctx.font = '12px monospace';
      config.ctx.textAlign = 'left';
      config.ctx.fillText(`Pontuação: ${config.player.score}`, 10, 20);
      config.ctx.fillText(`Vida: ${Math.round(config.player.health)}/${config.player.maxHealth}`, 10, 35);
      config.ctx.fillText(`Kills: ${config.player.kills}`, 10, 50);
      config.ctx.fillText(`Mortes: ${config.player.deaths}`, 10, 65);
      config.ctx.fillText(`Meta: ${20 - config.player.kills}`, 10, 80);

      if (!config.connected) {
        config.ctx.fillStyle = '#f00';
        config.ctx.font = 'bold 16px monospace';
        config.ctx.textAlign = 'center';
        config.ctx.fillText('DESCONECTADO', config.width / 2, config.height - 20);
      }

      const hudPanelX = 16;
      const hudPanelY = 16;
      config.ctx.fillStyle = 'rgba(5, 10, 18, 0.7)';
      config.ctx.fillRect(hudPanelX, hudPanelY, 240, 92);
      config.ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      config.ctx.strokeRect(hudPanelX, hudPanelY, 240, 92);
      config.ctx.fillStyle = '#9fe7ff';
      config.ctx.font = 'bold 13px monospace';
      config.ctx.textAlign = 'left';
      config.ctx.fillText('HUD', hudPanelX + 12, hudPanelY + 20);
      config.ctx.fillStyle = '#f5f7fb';
      config.ctx.font = '12px monospace';
      config.ctx.fillText(`Pontuação: ${config.player.score}`, hudPanelX + 12, hudPanelY + 40);
      config.ctx.fillText(`Vida: ${Math.round(config.player.health)}/${config.player.maxHealth}`, hudPanelX + 12, hudPanelY + 56);
      config.ctx.fillText(`Kills: ${config.player.kills} | Mortes: ${config.player.deaths}`, hudPanelX + 12, hudPanelY + 72);

      if (config.winner) {
        config.ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
        config.ctx.fillRect(0, 0, config.width, config.height);
        config.ctx.fillStyle = '#ffdb4d';
        config.ctx.font = 'bold 28px monospace';
        config.ctx.textAlign = 'center';
        config.ctx.fillText(`Vitória de ${config.winner.name}!`, config.width / 2, config.height / 2 - 10);
        config.ctx.font = '16px monospace';
        config.ctx.fillText('Reinicie para jogar de novo', config.width / 2, config.height / 2 + 20);
      } else if (!config.player.alive) {
        config.ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        config.ctx.fillRect(0, 0, config.width, config.height);
        config.ctx.fillStyle = '#ff5f5f';
        config.ctx.font = 'bold 24px monospace';
        config.ctx.textAlign = 'center';
        config.ctx.fillText('VOCÊ MORREU', config.width / 2, config.height / 2 - 10);
        config.ctx.font = '16px monospace';
        config.ctx.fillText('Respawn em breve...', config.width / 2, config.height / 2 + 20);
      }
    }

    function gameLoop() {
      const now = performance.now();
      const deltaTime = now - config.lastFrameTime;
      config.lastFrameTime = now;
      config.fps = Math.round(1000 / deltaTime);

      updatePlayer();
      render();
      updateUI();

      if (config.connected && now - config.lastUpdateTime > config.updateInterval) {
        if (config.socket) {
          config.socket.emit('playerMove', {
            x: config.player.x,
            y: config.player.y,
            angle: config.player.angle,
            score: config.player.score,
            alive: config.player.alive
          });
        }
        config.lastUpdateTime = now;
      }

      requestAnimationFrame(gameLoop);
    }

    function updateUI() {
      document.getElementById('socketId').textContent = config.socket ? config.socket.id || '-' : '-';
      document.getElementById('connStatus').textContent = config.connected ? 'Conectado' : 'Desconectado';
      document.getElementById('connIndicator').className = 'connection-indicator ' + (config.connected ? 'connected' : 'disconnected');
      document.getElementById('playerScore').textContent = config.player.score;
      document.getElementById('enemyCount').textContent = config.enemies.length;
      document.getElementById('fpsCounter').textContent = config.fps;
    }

    function updatePlayersList(players) {
      const list = document.getElementById('playersList');
      list.innerHTML = '';
      for (const player of players) {
        const entry = document.createElement('div');
        entry.className = 'player-entry';
        entry.innerHTML = `
          <div><strong>${player.name || 'Jogador'}</strong></div>
          <div>Status: ${player.alive === false ? 'Morto' : 'Vivo'}</div>
          <div>Pontos: <span style="color: #ff0;">${player.score || 0}</span></div>
          <div>Kills: ${player.kills || 0} | Mortes: ${player.deaths || 0}</div>
        `;
        list.appendChild(entry);
      }
    }

    function addLog(message, type = 'info') {
      const log = document.getElementById('messageLog');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
      while (log.children.length > 10) log.removeChild(log.firstChild);
    }

    function addChatMessage(message) {
      const container = document.getElementById('chatMessages');
      const entry = document.createElement('div');
      entry.className = 'log-entry info';
      entry.textContent = `${message.playerName || 'Jogador'}: ${message.text}`;
      container.appendChild(entry);
      container.scrollTop = container.scrollHeight;
      while (container.children.length > 10) container.removeChild(container.firstChild);
    }

    window.addEventListener('load', initGame);
  </script>
</body>
</html>
